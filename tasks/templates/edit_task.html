{% extends 'base.html' %} {% block title %}Edit Task{% endblock %} {% block content %}
<h1>✏️ Edit Task</h1>

<form method="POST">
    {% csrf_token %}
    <table>{{ form.as_table }}</table>

    <div style="margin-top: 20px" class="task-actions">
        <button type="submit" class="submit-btn">💾 Save Changes</button>
        <a href="{% url 'task_list' %}" class="cancel-link">Cancel</a>
    </div>
</form>

<div style="margin-top: 25px">
    <a
        href="{% url 'task_delete' task.id %}"
        onclick="return confirm('Are you sure you want to delete this task?');"
        style="color: #dc2626; font-weight: bold; text-decoration: none">
        ⛔ Delete Task
    </a>
</div>
{% endblock %}
