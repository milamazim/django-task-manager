<a href="{% url 'new_task' %}">Add New Task</a>

<h1>My Tasks</h1>

{% for task in tasks %}
<div>
    🌟
    <strong>{{ task.title }}</strong>
    - {{ task.description }}
    <br />
    Status: {{ task.status.name }}
    <br />
    <small>Created on: {{ task.created_on|date:"d/m/Y H:i" }}</small>
    <br />
    <small>Last update: {{ task.updated_on|date:"d/m/Y H:i" }}</small>
    <br />
    📝
    <a href="{% url 'task_edit' task.id %}">Edit</a>
    <hr />
</div>
{% empty %}
<p>No task has been found.</p>
{% endfor %}
